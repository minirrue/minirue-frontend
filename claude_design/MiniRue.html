<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiniRue — Cosmetics &amp; Perfumes</title>
<link rel="stylesheet" href="mr-tokens.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--mr-cream-200); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body { font-family: var(--mr-font-ui); color: var(--mr-ink-900); overflow-x: hidden; }
  button { font: inherit; }
  input, textarea { font: inherit; }

  /* ── Mobile-first responsive overrides ── */
  @media (max-width: 639px) {
    /* Tweaks panel full-width on mobile */
    #tweaks-panel { left: 16px; right: auto; width: 280px; bottom: 16px; }

    /* Footer grid stacks on mobile */
    [data-mr-footer] > div > div[style*="grid-template-columns: repeat(4"] {
      grid-template-columns: repeat(2,1fr) !important;
    }

    /* Product grid 2-col on mobile */
    .mr-page-sheet section > div[style*="grid-template-columns: repeat(4"] {
      grid-template-columns: repeat(2,1fr) !important;
    }

    /* Detail sticky left becomes scrollable on mobile */
    .detail-sticky-left {
      position: relative !important;
      height: auto !important;
      width: 100% !important;
    }

    /* Chat panel wider on mobile */
    #chat-panel-root { left: 12px; right: 12px; width: auto !important; }
  }

  @media (max-width: 1023px) {
    /* Dashboard sidebar hides on tablet — shown via hamburger future enhancement */
    .dash-sidebar-tablet { display: none; }
  }

  /* ── Tweaks panel chrome ── */
  #tweaks-panel {
    position: fixed; bottom: 24px; left: 24px; z-index: 1000;
    width: 260px; background: rgba(246,242,233,0.96);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--mr-hairline); border-radius: 14px;
    box-shadow: 0 24px 48px rgba(11,11,11,0.22);
    padding: 0; overflow: hidden;
    transform: translateY(0) scale(1);
    transition: transform 340ms cubic-bezier(0.34,1.56,0.64,1), opacity 260ms cubic-bezier(0.16,1,0.3,1);
  }
  #tweaks-panel[data-hidden] {
    transform: translateY(16px) scale(0.94);
    opacity: 0; pointer-events: none;
  }
  #tweaks-panel header {
    padding: 14px 18px 10px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--mr-hairline);
  }
  #tweaks-panel header h3 {
    margin: 0; font-family: Jost, sans-serif; font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--mr-ink-500);
  }
  #tweaks-panel .tp-body { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 16px; }
  .tp-group label {
    display: block; font-family: Jost, sans-serif; font-size: 9px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--mr-ink-400); margin-bottom: 8px;
  }
  .tp-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .tp-pill {
    padding: 7px 14px; border-radius: 999px; border: 1px solid var(--mr-border);
    background: transparent; color: var(--mr-ink-700); cursor: pointer;
    font-family: Jost, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    transition: all 200ms cubic-bezier(0.34,1.56,0.64,1);
  }
  .tp-pill[data-active] { background: var(--mr-ink-900); color: var(--mr-cream-100); border-color: var(--mr-ink-900); transform: scale(1.04); }
  .tp-pill:hover:not([data-active]) { background: var(--mr-cream-300); transform: scale(1.02); }

  /* ── Page view transitions ── */
  .mr-view { will-change: transform, opacity; }
  .mr-view-enter {
    animation: mr-view-in 380ms cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes mr-view-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .mr-view-exit {
    animation: mr-view-out 220ms cubic-bezier(0.4,0,1,1) both;
  }
  @keyframes mr-view-out {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  /* ── Magnetic cursor ── */
  .mr-cursor {
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid rgba(149,120,60,0.5);
    transform: translate(-50%,-50%);
    transition: width 300ms cubic-bezier(0.34,1.56,0.64,1),
                height 300ms cubic-bezier(0.34,1.56,0.64,1),
                background 300ms, border-color 300ms, opacity 300ms;
    mix-blend-mode: multiply;
  }
  .mr-cursor.enlarged { width: 72px; height: 72px; background: rgba(149,120,60,0.08); border-color: rgba(149,120,60,0.35); }

  /* root always visible */
  #root { opacity: 1; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- GSAP + ScrollTrigger (free tier — covers all scroll-driven animations) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<script>
  // Register GSAP plugins immediately
  if (window.gsap && window.ScrollTrigger) {
    gsap.registerPlugin(ScrollTrigger);
  }
</script>
</head>
<body>
<!-- Custom cursor (desktop only) -->
<div class="mr-cursor" id="mr-cursor"></div>

<div id="root"></div>

<!-- Motion engine — must load before components -->
<script src="motion.js"></script>

<!-- Components -->
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="StorefrontChrome.jsx"></script>
<script type="text/babel" src="StorefrontContent.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="ChatWidget.jsx"></script>

<!-- Main App -->
<script type="text/babel">

/* ═══════════════════════════════════════════════════════════
   TWEAKS DEFAULTS — JSON between markers, do not remove
   ═══════════════════════════════════════════════════════════ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "motion": "ios",
  "splash": true,
  "cursor": true
}/*EDITMODE-END*/;

/* ── Motion personality CSS tokens map ── */
const PERSONALITY_TOKENS = {
  luxury: {
    '--mp-dur-hover':   '350ms',
    '--mp-dur-enter':   '580ms',
    '--mp-ease-hover':  'cubic-bezier(0.16, 1, 0.3, 1)',
    '--mp-scale-hover': '1.01',
    '--mp-stagger':     '60ms',
  },
  ios: {
    '--mp-dur-hover':   '260ms',
    '--mp-ease-hover':  'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
    '--mp-scale-hover': '1.02',
    '--mp-stagger':     '48ms',
  },
  energetic: {
    '--mp-dur-hover':   '180ms',
    '--mp-ease-hover':  'cubic-bezier(0.34, 1.56, 0.64, 1)',
    '--mp-scale-hover': '1.035',
    '--mp-stagger':     '36ms',
  },
};

function applyPersonality(p) {
  const tokens = PERSONALITY_TOKENS[p] || PERSONALITY_TOKENS.ios;
  Object.entries(tokens).forEach(([k, v]) => {
    document.documentElement.style.setProperty(k, v);
  });
  document.documentElement.setAttribute('data-motion', p);
  if (window.setMotionPersonality) window.setMotionPersonality(p);
}

/* ── Magnetic cursor ── */
function initCursor(enabled) {
  const el = document.getElementById('mr-cursor');
  if (!el) return;
  el.style.display = enabled ? 'block' : 'none';
  if (!enabled) return;

  let mx = -100, my = -100, cx = -100, cy = -100;
  let raf;

  const lerp = (a, b, t) => a + (b - a) * t;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
  });

  const tick = () => {
    cx = lerp(cx, mx, 0.12);
    cy = lerp(cy, my, 0.12);
    el.style.transform = `translate(${cx - 20}px, ${cy - 20}px)`;
    raf = requestAnimationFrame(tick);
  };
  raf = requestAnimationFrame(tick);

  // Enlarge on interactive elements
  const add = () => el.classList.add('enlarged');
  const rem = () => el.classList.remove('enlarged');
  document.querySelectorAll('button, a, [role="button"], input').forEach(b => {
    b.addEventListener('mouseenter', add);
    b.addEventListener('mouseleave', rem);
  });

  return () => {
    cancelAnimationFrame(raf);
    document.removeEventListener('mousemove', () => {});
  };
}

/* ── App ──────────────────────────────────────────────────── */
function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  // App views: 'splash' | 'storefront' | 'detail' | 'dashboard'
  const [appView, setAppView] = React.useState('splash'); // always splash on load
  const [selected, setSelected] = React.useState(null);
  const [cart, setCart] = React.useState([]);
  const [cartOpen, setCartOpen] = React.useState(false);
  const [cartBump, setCartBump] = React.useState(false);
  const [chatOpen, setChatOpen] = React.useState(false);

  // Set body background per view for correct footer reveal
  React.useEffect(() => {
    if (appView === 'splash') {
      document.body.style.background = 'var(--mr-ink-900)';
    } else if (appView === 'dashboard') {
      document.body.style.background = 'var(--mr-dash-bg)';
    } else {
      document.body.style.background = 'var(--mr-ink-900)';
    }
  }, [appView]);

  // Apply personality on mount + change
  React.useEffect(() => {
    applyPersonality(tweaks.motion);
  }, [tweaks.motion]);

  // Init cursor
  React.useEffect(() => {
    const cleanup = initCursor(tweaks.cursor);
    return cleanup;
  }, [tweaks.cursor]);

  // Show root once ready
  React.useEffect(() => {
    document.getElementById('root').classList.add('ready');
  }, []);

  // Tweak panel host protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  // Cart helpers
  const addToBag = (p) => {
    setCart(c => [...c, p]);
    setCartBump(true);
    setTimeout(() => setCartBump(false), 500);
    setCartOpen(true);
  };

  // Navigate
  const goDetail = (p) => { setSelected(p); setAppView('detail'); window.scrollTo(0, 0); };
  const goHome   = ()  => { setSelected(null); setAppView('storefront'); window.scrollTo(0, 0); };
  const goDash   = ()  => { setAppView('dashboard'); window.scrollTo(0, 0); };
  const goStore  = ()  => { setAppView('storefront'); window.scrollTo(0, 0); };

  const splashDone = () => {
    setAppView('storefront');
  };

  const isStorefront = appView === 'storefront' || appView === 'detail';

  return (
    <>
      {/* Splash */}
      {appView === 'splash' && <SplashScreen onComplete={splashDone} />}

      {/* Dashboard */}
      {appView === 'dashboard' && (
        <div className="mr-view mr-view-enter">
          <DashboardApp onStorefront={goStore} />
        </div>
      )}

      {/* Storefront shell */}
      {isStorefront && (
        <>
          <div className="mr-view mr-view-enter" style={{ position:'relative', zIndex:1 }}>
            <Header
              onOpenCart={() => setCartOpen(true)}
              cartCount={cart.length}
              transparent={appView === 'storefront'}
              onDashboard={goDash}
            />
            <div className="mr-page-sheet">
              {appView === 'storefront' && (
                <HomeView onSelect={goDetail} />
              )}
              {appView === 'detail' && selected && (
                <main data-screen-label="Storefront · Product detail">
                  <ProductDetail product={selected} onBack={goHome} onAddToBag={addToBag} />
                </main>
              )}
            </div>
          </div>
          {/* Footer + Cart OUTSIDE the animated wrapper so position:fixed works */}
          <Footer />
          <CartDrawer
            open={cartOpen}
            onClose={() => setCartOpen(false)}
            items={cart}
            onRemove={(i) => setCart(c => c.filter((_, j) => j !== i))}
          />
        </>
      )}

      {/* Chat support — always visible except during splash */}
      {appView !== 'splash' && (
        <>
          <ChatPanel open={chatOpen} onClose={() => setChatOpen(false)} />
          <ChatButton onClick={() => setChatOpen(o => !o)} hasUnread={true} />
        </>
      )}

      {/* Tweaks Panel */}
      <div id="tweaks-panel" {...(!tweaksOpen ? { 'data-hidden': '' } : {})}>
        <header>
          <h3>Tweaks</h3>
          <button onClick={() => {
            setTweaksOpen(false);
            window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
          }} style={{
            background: 'none', border: 0, cursor: 'pointer',
            color: 'var(--mr-ink-500)', padding: 4, lineHeight: 1,
            fontSize: 16, transition: 'color 150ms',
          }}>×</button>
        </header>
        <div className="tp-body">
          {/* Motion personality */}
          <div className="tp-group">
            <label>Motion Personality</label>
            <div className="tp-pills">
              {[
                { k: 'luxury',    label: 'Luxury'    },
                { k: 'ios',       label: 'iOS'        },
                { k: 'energetic', label: 'Energetic'  },
              ].map(opt => (
                <button key={opt.k} className="tp-pill"
                  {...(tweaks.motion === opt.k ? { 'data-active': '' } : {})}
                  onClick={() => setTweak('motion', opt.k)}>
                  {opt.label}
                </button>
              ))}
            </div>
          </div>

          {/* Cursor */}
          <div className="tp-group">
            <label>Custom Cursor</label>
            <div className="tp-pills">
              <button className="tp-pill" {...(tweaks.cursor ? { 'data-active': '' } : {})} onClick={() => setTweak('cursor', true)}>On</button>
              <button className="tp-pill" {...(!tweaks.cursor ? { 'data-active': '' } : {})} onClick={() => setTweak('cursor', false)}>Off</button>
            </div>
          </div>

          {/* Quick nav */}
          <div className="tp-group">
            <label>Jump to view</label>
            <div className="tp-pills">
              <button className="tp-pill" onClick={goStore}>Storefront</button>
              <button className="tp-pill" onClick={goDash}>Dashboard</button>
            </div>
          </div>

          {/* Splash */}
          <div className="tp-group">
            <label>Splash on reload</label>
            <div className="tp-pills">
              <button className="tp-pill"
                {...(tweaks.splash ? { 'data-active': '' } : {})}
                onClick={() => {
                  setTweak('splash', true);
                  sessionStorage.removeItem('mr-seen');
                }}>On</button>
              <button className="tp-pill"
                {...(!tweaks.splash ? { 'data-active': '' } : {})}
                onClick={() => setTweak('splash', false)}>Off</button>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- GSAP scroll animations — runs after React mounts -->
<script>
(function initGSAPScrollAnimations() {
  if (!window.gsap || !window.ScrollTrigger) return;

  // Wait for React to paint before attaching ScrollTrigger
  setTimeout(() => {
    gsap.registerPlugin(ScrollTrigger);

    // Stagger-reveal every .mr-eyebrow + h2 pair in section headers
    gsap.utils.toArray('section').forEach(section => {
      const eyebrow = section.querySelector('.mr-eyebrow');
      const h2 = section.querySelector('h2');
      if (!eyebrow && !h2) return;

      const tl = gsap.timeline({
        scrollTrigger: {
          trigger: section,
          start: 'top 82%',
          toggleActions: 'play none none reverse',
        }
      });
      if (eyebrow) tl.from(eyebrow, { opacity: 0, y: 10, duration: 0.5, ease: 'power3.out' });
      if (h2) tl.from(h2, { opacity: 0, y: 14, duration: 0.55, ease: 'power3.out' }, '-=0.25');
    });

  }, 800);
})();
</script>

<!-- Magnetic cursor — re-attach after every React render -->
<script>
(function() {
  // Delegate: whenever mouse enters a button/a, enlarge cursor
  document.addEventListener('mouseover', (e) => {
    const el = document.getElementById('mr-cursor');
    if (!el) return;
    if (e.target.closest('button, a, [role="button"]')) {
      el.classList.add('enlarged');
    }
  });
  document.addEventListener('mouseout', (e) => {
    const el = document.getElementById('mr-cursor');
    if (!el) return;
    if (e.target.closest('button, a, [role="button"]')) {
      el.classList.remove('enlarged');
    }
  });
})();
</script>
</body>
</html>
